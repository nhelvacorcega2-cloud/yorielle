/* ── HEADER ── */
header{
  background:linear-gradient(135deg,#e8447a,#f472a8); color:#fff;
  padding:14px 28px; display:flex; align-items:center;
  justify-content:space-between; border-bottom:none;
  position:sticky; top:0; z-index:100;
  box-shadow:0 2px 16px rgba(232,68,122,0.25);
}
.brand{font-size:18px;font-weight:700;letter-spacing:.04em}
.header-right{display:flex;align-items:center;gap:14px}

/* auth button */
.btn-auth{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.2);
  border:1px solid rgba(255,255,255,0.35);
  color:#fff; border-radius:20px;
  padding:7px 14px; font-size:13px; font-weight:500;
  cursor:pointer; font-family:inherit;
  transition:background .15s;
}
.btn-auth:hover{background:rgba(255,255,255,0.2)}
.btn-auth .avatar{
  width:22px;height:22px;border-radius:50%;
  object-fit:cover;display:none;
}



/* ── MAIN ── */
main{flex:1;max-width:860px;width:100%;margin:0 auto;padding:36px 20px 60px}

/* ── AUTH WALL ── */
#authWall{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:400px;gap:16px;text-align:center;
  background:rgba(255,240,246,0.82);border-radius:24px;padding:40px;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(251,200,221,0.6);
}
.auth-icon{font-size:52px;margin-bottom:8px}
#authWall h2{font-size:22px;font-weight:700;letter-spacing:-.01em}
#authWall p{font-size:14px;color:var(--muted);max-width:380px;line-height:1.7}
.btn-signin{
  margin-top:8px;display:inline-flex;align-items:center;gap:10px;
  background:#fff;color:#e8447a;border:2px solid #fbc8dd;
  border-radius:20px;padding:12px 24px;font-size:14px;font-weight:600;
  cursor:pointer;font-family:inherit;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  transition:box-shadow .15s,transform .1s;
}
.btn-signin:hover{box-shadow:0 4px 16px rgba(0,0,0,.12);transform:translateY(-1px)}
.btn-signin img{width:20px;height:20px}

/* ── CARD ── */
#appWall{display:block}
.card{
  background:rgba(255,240,246,0.88);border:1px solid var(--border);
  border-radius:20px;padding:26px 28px 22px;margin-bottom:18px;
  box-shadow:0 4px 24px rgba(200,50,100,0.12);transition:background .25s,border-color .25s;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.card label{display:block;font-size:15px;font-weight:600;margin-bottom:12px}
.email-field{position:relative;margin-bottom:8px}
.email-field input{
  width:100%;height:48px;border:1px solid var(--border);border-radius:8px;
  padding:0 18px;font-size:15px;background:var(--bg);color:var(--fg);
  outline:none;font-family:inherit;transition:border-color .2s,box-shadow .2s,background .25s;
  border-radius:12px;
}
.email-field input:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(14,165,233,.12);
  background:var(--surface);
}
.email-field input::placeholder{color:#b0bac4}
.hint{font-size:12px;color:var(--muted);margin-bottom:16px}

.btn-row{display:flex;gap:10px;flex-wrap:wrap}
.btn{
  height:40px;padding:0 20px;border:none;border-radius:20px;
  font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
  letter-spacing:.02em;transition:filter .15s,transform .1s,opacity .15s;
  color:#fff;white-space:nowrap;
}
.btn:hover{filter:brightness(1.08)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-copy{background:var(--btn-copy,#0ea5e9)}
.btn-rand{background:var(--btn-rand,#64748b)}
.btn-get{background:var(--btn-get,#06b6d4)}

/* ── INBOX ── */
.inbox-wrap{
  background:rgba(255,245,249,0.88);border:1px solid var(--inbox-border);
  border-radius:20px;min-height:300px;overflow:hidden;
  transition:background .25s,border-color .25s;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.inbox-toolbar{
  display:none;align-items:center;justify-content:space-between;
  padding:12px 18px;border-bottom:1px solid var(--inbox-border);
  font-size:13px;color:var(--muted);
}
.inbox-toolbar strong{color:var(--fg)}
.btn-refresh{
  background:none;border:1px solid var(--border);color:var(--muted);
  border-radius:20px;padding:5px 14px;font-size:12px;cursor:pointer;
  font-family:inherit;transition:color .15s,border-color .15s;
}
.btn-refresh:hover{color:var(--fg);border-color:var(--muted)}

.email-list{list-style:none}
.email-row{
  display:grid;grid-template-columns:1fr auto;gap:3px 16px;
  padding:14px 18px;border-bottom:1px solid var(--inbox-border);
  cursor:pointer;transition:background .12s;
}
.email-row:last-child{border-bottom:none}
.email-row:hover{background:var(--surface)}
.email-row.unread .row-subject{font-weight:700}
.row-from{font-size:13px;font-weight:600;color:var(--fg)}
.row-time{font-size:11px;color:var(--muted);text-align:right;white-space:nowrap;margin-top:2px}
.row-subject{font-size:13px;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-preview{font-size:12px;color:var(--muted);grid-column:1/3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.inbox-placeholder{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:260px;gap:10px;color:var(--muted);font-size:14px;text-align:center;padding:20px;
}
.inbox-placeholder .icon{font-size:44px;margin-bottom:6px;opacity:.4}
.spinner{
  width:22px;height:22px;border:2px solid var(--border);
  border-top-color:#e8447a;border-radius:50%;
  animation:spin .7s linear infinite;margin-bottom:8px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MODAL ── */
.modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.45);z-index:300;
  align-items:center;justify-content:center;padding:20px;
}
.modal-bg.open{display:flex}
.modal{
  background:var(--surface);border-radius:24px;
  width:100%;max-width:640px;max-height:88vh;overflow-y:auto;
  box-shadow:0 24px 60px rgba(0,0,0,.25);
  animation:slideUp .2s ease;transition:background .25s;
}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{
  padding:22px 24px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;gap:16px;
}
.modal-subject{font-size:17px;font-weight:700;letter-spacing:-.01em;line-height:1.3}
.modal-close{
  background:none;border:none;font-size:22px;cursor:pointer;
  color:var(--muted);padding:0;line-height:1;flex-shrink:0;transition:color .15s;
}
.modal-close:hover{color:var(--fg)}
.modal-meta{
  padding:14px 24px;border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;gap:5px;
}
.meta-row{display:flex;gap:8px;font-size:13px}
.meta-lbl{color:var(--muted);width:40px;flex-shrink:0}
.meta-val{color:var(--fg);word-break:break-all}
.modal-otp{
  margin:18px 24px 0;background:#fff0f6;
  border:2px solid #f9a8c9;border-radius:16px;
  padding:16px 20px;display:flex;align-items:center;
  justify-content:space-between;gap:16px;
}
.otp-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--otp-fg);margin-bottom:4px}
.otp-code{font-size:34px;font-weight:800;letter-spacing:.18em;color:var(--otp-fg);font-family:'Courier New',monospace}
.btn-otp-copy{
  background:#e8447a;color:#fff;border:none;border-radius:20px;
  padding:9px 18px;font-size:12px;font-weight:700;cursor:pointer;
  font-family:inherit;letter-spacing:.04em;transition:background .15s;white-space:nowrap;
}
.btn-otp-copy:hover{background:#c73068}
.btn-otp-copy.done{background:#6b7280}
.modal-body{
  padding:20px 24px 28px;font-size:14px;line-height:1.8;
  color:var(--fg);white-space:pre-wrap;word-break:break-word;
}

/* ── FOOTER ── */
footer{
  background:linear-gradient(135deg,#c73068,#e8447a);color:#ffd6e8;
  text-align:center;padding:16px;font-size:12px;letter-spacing:.03em;
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#1e293b;color:#f1f5f9;
  padding:11px 22px;border-radius:8px;font-size:13px;font-weight:500;
  opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;
  z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.2);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── RESPONSIVE ── */
@media(max-width:500px){
  header{padding:12px 16px}
  .brand{font-size:15px}
  main{padding:20px 12px 48px}
  .card{padding:18px 14px}
  .btn-row{flex-direction:column}
  .btn{width:100%;height:44px}
  .modal-otp{flex-direction:column;align-items:flex-start}
  .btn-otp-copy{width:100%}
  .header-right{gap:8px}
  
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="brand">🎀 kagom.store</div>
  <div class="header-right"></div>
</header>

<!-- MAIN -->
<main>

  <!-- APP -->
  <div id="appWall">
    <div class="card">
      <label for="emailInput">Enter Email Address:</label>
      <div class="email-field">
        <input type="text" id="emailInput" placeholder="Enter email"
               autocomplete="off" spellcheck="false"
               onkeydown="if(event.key==='Enter')getEmail()"/>
      </div>
      <div class="hint">Enter any @kagom.store address to check its inbox.</div>
      <div class="btn-row">
        <button class="btn btn-copy" onclick="copyEmail()">Copy Email</button>
        <button class="btn btn-rand" onclick="randomEmail()">Generate Random Email</button>
        <button class="btn btn-get" onclick="getEmail()">Get Email</button>
      </div>
    </div>

    <div class="inbox-wrap" id="inboxWrap">
      <div class="inbox-placeholder" id="placeholder">
        <div class="icon">🌸</div>
        <div>Enter a <strong>@kagom.store</strong> address and click <strong>Get Email</strong></div>
      </div>
      <div class="inbox-toolbar" id="toolbar">
        <div><strong id="toolbarAddr"></strong> &mdash; <span id="toolbarCount">0 emails</span></div>
        <button class="btn-refresh" onclick="refresh()">↻ Refresh</button>
      </div>
      <ul class="email-list" id="emailList"></ul>
    </div>
  </div>

</main>

<!-- EMAIL DETAIL MODAL -->
<div class="modal-bg" id="modal" onclick="closeModalBg(event)">
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <div class="modal-subject" id="mSubject"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-meta">
      <div class="meta-row"><span class="meta-lbl">From</span><span class="meta-val" id="mFrom"></span></div>
      <div class="meta-row"><span class="meta-lbl">To</span><span class="meta-val" id="mTo"></span></div>
      <div class="meta-row"><span class="meta-lbl">Date</span><span class="meta-val" id="mDate"></span></div>
    </div>
    <div id="mOtp" style="display:none" class="modal-otp">
      <div>
        <div class="otp-label">🔑 Code Detected</div>
        <div class="otp-code" id="mOtpCode"></div>
      </div>
      <button class="btn-otp-copy" id="mOtpBtn" onclick="copyOtp()">Copy Code</button>
    </div>
    <div class="modal-body" id="mBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<footer>💗 kagom.store &copy; 2026</footer>

<script>
// ── CONFIG ────────────────────────────────────────────────────
const DOMAIN = 'kagom.store';
const API    = '/api/inbox';   // serverless backend that reads the mailbox

// ── STATE ─────────────────────────────────────────────────────
let currentAddress = '';
let currentEmails  = [];
let currentOtp     = '';
let pollTimer      = null;

// ── EMAIL INPUT HELPERS ───────────────────────────────────────
function getInputEmail(){
  let val = document.getElementById('emailInput').value.trim();
  val = val.replace(/@.*/,'');
  return val ? val + '@' + DOMAIN : '';
}
function copyEmail(){
  const a = getInputEmail();
  if (!a){ toast('Enter an email first'); return; }
  navigator.clipboard.writeText(a).then(() => toast('Copied: ' + a));
}
function randomEmail(){
  const c='abcdefghijklmnopqrstuvwxyz0123456789';
  let n='';for(let i=0;i<9;i++) n+=c[Math.floor(Math.random()*c.length)];
  document.getElementById('emailInput').value = n + '@' + DOMAIN;
}

// ── FETCH EMAILS ──────────────────────────────────────────────
function getEmail(){
  const addr = getInputEmail();
  if (!addr){ toast('Enter an email address first'); return; }
  currentAddress = addr;
  clearInterval(pollTimer);
  showLoading();
  fetchEmails();
  pollTimer = setInterval(fetchEmails, 20000);
}

function refresh(){ showLoading(); fetchEmails(); }

function fetchEmails(){
  if (!currentAddress) return;
  fetch(API + '?address=' + encodeURIComponent(currentAddress))
    .then(r => r.json())
    .then(data => {
      if (data.error){ renderEmails([]); toast(data.error); return; }
      const emails = (data.emails || []).map(e => ({
        id:      e.id,
        from:    e.from || '(unknown sender)',
        to:      e.to   || currentAddress,
        subject: e.subject || '(no subject)',
        body:    e.body || '',
        preview: (e.body || '').replace(/\s+/g,' ').slice(0,120),
        date:    new Date(e.date),
        unread:  !!e.unread,
        otp:     detectOtp(e.body || ''),
      }));
      emails.sort((a,b) => b.date - a.date);
      renderEmails(emails);
    })
    .catch(err => {
      console.error(err);
      renderEmails([]);
      toast('Error loading emails — check console');
    });
}

// ── PARSE GMAIL MESSAGE ───────────────────────────────────────
function parseGmailMessage(msg){
  try {
    const headers = msg.payload.headers || [];
    const h = (name) => (headers.find(h => h.name.toLowerCase()===name.toLowerCase())||{}).value || '';
    const body = extractBody(msg.payload);
    return {
      id:      msg.id,
      from:    h('from'),
      to:      h('to'),
      subject: h('subject') || '(no subject)',
      preview: body.replace(/\s+/g,' ').slice(0,120),
      body:    body,
      date:    new Date(parseInt(msg.internalDate)),
      unread:  (msg.labelIds||[]).includes('UNREAD'),
      otp:     detectOtp(body),
    };
  } catch(e){ return null; }
}

function extractBody(payload){
  // Try to get plain text body
  if (payload.body && payload.body.data)
    return atob(payload.body.data.replace(/-/g,'+').replace(/_/g,'/'));

  if (payload.parts){
    // prefer text/plain
    for (const part of payload.parts){
      if (part.mimeType === 'text/plain' && part.body && part.body.data)
        return atob(part.body.data.replace(/-/g,'+').replace(/_/g,'/'));
    }
    // fallback: text/html stripped
    for (const part of payload.parts){
      if (part.mimeType === 'text/html' && part.body && part.body.data){
        const html = atob(part.body.data.replace(/-/g,'+').replace(/_/g,'/'));
        return stripHtml(html);
      }
    }
    // recurse into nested parts
    for (const part of payload.parts){
      if (part.parts){
        const result = extractBody(part);
        if (result) return result;
      }
    }
  }
  return '(no readable content)';
}

function stripHtml(html){
  return html
    .replace(/<style[^>]*>[\s\S]*?<\/style>/gi,'')
    .replace(/<script[^>]*>[\s\S]*?<\/script>/gi,'')
    .replace(/<[^>]+>/g,' ')
    .replace(/&nbsp;/g,' ')
    .replace(/&amp;/g,'&')
    .replace(/&lt;/g,'<')
    .replace(/&gt;/g,'>')
    .replace(/&quot;/g,'"')
    .replace(/\s{2,}/g,' ')
    .trim();
}

// ── OTP DETECTION ─────────────────────────────────────────────
function detectOtp(text){
  // Match 4–8 digit standalone codes
  const patterns = [
    /\b([0-9]{6})\b/,   // 6-digit (most common)
    /\b([0-9]{4})\b/,   // 4-digit
    /\b([0-9]{8})\b/,   // 8-digit
    /\b([0-9]{5})\b/,   // 5-digit
    /\b([0-9]{7})\b/,   // 7-digit
  ];
  for (const p of patterns){
    const m = text.match(p);
    if (m) return m[1];
  }
  return null;
}

// ── RENDER ────────────────────────────────────────────────────
function showLoading(){
  const ph = document.getElementById('placeholder');
  ph.style.display = 'flex';
  ph.innerHTML = '<div class="spinner"></div><div>Checking inbox…</div>';
  document.getElementById('toolbar').style.display = 'none';
  document.getElementById('emailList').innerHTML = '';
}

function renderEmails(emails){
  currentEmails = emails;
  const ph      = document.getElementById('placeholder');
  const toolbar = document.getElementById('toolbar');
  const list    = document.getElementById('emailList');

  toolbar.style.display = 'flex';
  document.getElementById('toolbarAddr').textContent  = currentAddress;
  document.getElementById('toolbarCount').textContent =
    emails.length + (emails.length===1?' email':' emails');

  if (!emails.length){
    ph.style.display = 'flex';
    ph.innerHTML = '<div class="icon">🌸</div><div>No emails yet for <strong>' + currentAddress +
      '</strong><br><small>Auto-refreshes every 20s</small></div>';
    list.innerHTML = '';
    return;
  }

  ph.style.display = 'none';
  list.innerHTML = emails.map((e,i) => `
    <li class="email-row ${e.unread?'unread':''}" onclick="openEmail(${i})">
      <div class="row-from">${esc(e.from)}</div>
      <div class="row-time">${timeAgo(e.date)}</div>
      <div class="row-subject">${esc(e.subject)}</div>
      <div class="row-preview">${esc(e.preview)}</div>
    </li>`).join('');
}

// ── OPEN EMAIL ────────────────────────────────────────────────
function openEmail(i){
  const e = currentEmails[i];
  document.getElementById('mSubject').textContent = e.subject;
  document.getElementById('mFrom').textContent    = e.from;
  document.getElementById('mTo').textContent      = e.to || currentAddress;
  document.getElementById('mDate').textContent    = e.date.toLocaleString();
  document.getElementById('mBody').textContent    = e.body;

  currentOtp = e.otp || '';
  const otpBox = document.getElementById('mOtp');
  if (currentOtp){
    otpBox.style.display = 'flex';
    document.getElementById('mOtpCode').textContent = currentOtp;
    const btn = document.getElementById('mOtpBtn');
    btn.textContent = 'Copy Code'; btn.classList.remove('done');
  } else {
    otpBox.style.display = 'none';
  }

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function copyOtp(){
  if (!currentOtp) return;
  navigator.clipboard.writeText(currentOtp).then(() => {
    const btn = document.getElementById('mOtpBtn');
    btn.textContent = '✓ Copied!'; btn.classList.add('done');
    toast('Code copied: ' + currentOtp);
  });
}
function closeModalBg(e){ if (e.target===document.getElementById('modal')) closeModal(); }
function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

// ── UTILS ─────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function timeAgo(date){
  const s = Math.floor((Date.now()-new Date(date))/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
function toast(msg,dur=2800){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

// ── INIT ──────────────────────────────────────────────────────
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
</script>
</body>
</html>
